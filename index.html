<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MedScan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --white: #ffffff;
  --bg: #f4f5f7;
  --gray: #d8dce2;
  --blue: #5bb8f5;
  --blue-ring: #a8d8f8;
  --blue-dark: #1a7abf;
  --green: #22c55e;
  --red: #ef4444;
  --bottom-h: 160px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100dvh;
}

/* ══ CAMERA ══ */
.cam-wrap {
  flex: 1;
  position: relative;
  background: #c8cdd4;
  overflow: hidden;
  touch-action: none;
}

.cam-wrap video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform-origin: center center;
  will-change: transform;
  pointer-events: none;
  display: none;
}

.cam-idle {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #d0d4da;
}
.cam-idle svg { opacity: 0.28; }
.cam-idle p { font-size: 13px; color: #666; font-weight: 500; }

.zoom-badge {
  position: absolute;
  top: 14px; right: 14px;
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 12px; font-weight: 700;
  padding: 4px 11px;
  border-radius: 100px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  z-index: 5;
  backdrop-filter: blur(6px);
}
.zoom-badge.show { opacity: 1; }

.pinch-hint {
  position: absolute;
  bottom: 12px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.45);
  color: rgba(255,255,255,0.85);
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 100px;
  pointer-events: none;
  white-space: nowrap;
  display: none;
  backdrop-filter: blur(6px);
}
.cam-on .pinch-hint { display: block; animation: fadeHint 3s forwards 2.5s; }
@keyframes fadeHint { to { opacity: 0; } }

canvas { display: none; }

/* ══ BOTTOM ══ */
.bottom {
  height: var(--bottom-h);
  background: var(--white);
  border-top: 1.5px solid var(--gray);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-evenly;
  padding: 10px 20px 14px;
  flex-shrink: 0;
}

.row-capture {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.capture-btn {
  width: 66px; height: 66px;
  border-radius: 50%;
  border: 3px solid var(--blue-ring);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.15s;
}
.capture-btn:active { transform: scale(0.88); }
.capture-inner {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 4px 14px rgba(91,184,245,0.55);
  transition: background 0.15s;
}
.capture-btn:active .capture-inner { background: #3aa0e0; }

.row-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 10px;
}

.led-group { display: flex; gap: 10px; }

.led-card {
  width: 80px;
  background: var(--white);
  border: 1.5px solid var(--gray);
  border-radius: 12px;
  padding: 9px 10px 10px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 7px;
  cursor: pointer;
  user-select: none;
  transition: border-color 0.2s, background 0.2s;
}
.led-card:active { opacity: 0.75; }
.led-card.on { border-color: var(--blue); background: rgba(91,184,245,0.07); }

.led-indicator {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--gray);
  transition: background 0.2s;
}
.led-card.on .led-indicator {
  background: var(--blue);
  box-shadow: 0 0 8px rgba(91,184,245,0.5);
}

.toggle {
  width: 46px; height: 26px;
  background: var(--gray);
  border-radius: 13px;
  position: relative;
  transition: background 0.22s;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.led-card.on .toggle { background: var(--blue); }
.led-card.on .toggle::after { transform: translateX(20px); }

.ble-btn {
  width: 42px; height: 72px;
  background: var(--gray);
  border: 1.5px solid transparent;
  border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.ble-btn:active { opacity: 0.7; }
.ble-btn.on { background: rgba(91,184,245,0.15); border-color: var(--blue); }
.ble-btn span {
  font-size: 9px; font-weight: 700;
  color: #555;
  text-align: center;
  line-height: 1.2;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.ble-btn.on span { color: var(--blue-dark); }

/* ══ PREVIEW OVERLAY ══ */
.prev-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 24px 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.prev-overlay.show { opacity: 1; pointer-events: all; }
.prev-overlay img {
  max-width: 100%; max-height: 50vh;
  border-radius: 12px; object-fit: contain;
  box-shadow: 0 12px 48px rgba(0,0,0,0.7);
}
.prev-label { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 500; }

/* Progress */
.prog-wrap {
  width: 100%;
  display: none;
  flex-direction: column;
  gap: 8px;
}
.prog-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.prog-info span {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}
.prog-track {
  width: 100%; height: 5px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden;
}
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 3px;
  transition: width 0.25s ease;
}

/* Action buttons */
.prev-actions { display: flex; gap: 10px; width: 100%; }
.pv-btn {
  flex: 1; height: 50px;
  border: none; border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.pv-btn:active { opacity: 0.7; }
.pv-discard { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75); }
.pv-galeri  { background: var(--blue); color: #fff; box-shadow: 0 4px 14px rgba(91,184,245,0.35); }
.pv-drive   { background: #4285f4; color: #fff; box-shadow: 0 4px 14px rgba(66,133,244,0.35); }

/* Drive result link */
.drive-link {
  display: none;
  color: #a8d8f8;
  font-size: 12px;
  text-align: center;
  text-decoration: underline;
  word-break: break-all;
  cursor: pointer;
}

/* ══ TOAST ══ */
#toast {
  position: fixed;
  bottom: calc(var(--bottom-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(10,10,10,0.88);
  color: #fff;
  font-size: 13px; font-weight: 500;
  padding: 10px 22px;
  border-radius: 100px;
  z-index: 300;
  opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter: blur(10px);
  white-space: nowrap;
  font-family: 'Plus Jakarta Sans', sans-serif;
  max-width: 90vw;
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok   { background: rgba(0,150,70,0.92); }
#toast.err  { background: rgba(200,30,30,0.92); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- Preview Overlay -->
<div class="prev-overlay" id="prevOverlay">
  <div class="prev-label">Foto berhasil diambil</div>
  <img id="prevImg" alt="">

  <!-- Progress (muncul saat upload) -->
  <div class="prog-wrap" id="progWrap">
    <div class="prog-info">
      <span id="progLabel">Mengupload ke Drive...</span>
      <span id="progPct">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill"></div>
    </div>
  </div>

  <!-- Link hasil upload -->
  <a class="drive-link" id="driveLink" target="_blank">Buka di Google Drive ↗</a>

  <!-- Tombol aksi -->
  <div class="prev-actions" id="prevActions">
    <button class="pv-btn pv-discard" onclick="buangFoto()">✕</button>
    <button class="pv-btn pv-galeri"  onclick="simpanGaleri()">📱 Galeri</button>
    <button class="pv-btn pv-drive"   onclick="uploadDrive()">☁ Drive</button>
  </div>
</div>

<div class="app">
  <!-- Camera -->
  <div class="cam-wrap" id="camWrap">
    <div class="cam-idle" id="camIdle">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.3">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>Tap tombol biru untuk mulai kamera</p>
    </div>
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="cvs"></canvas>
    <div class="zoom-badge" id="zoomBadge">1.0×</div>
    <div class="pinch-hint">Cubit 2 jari untuk zoom · Tap 2× reset</div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom">
    <div class="row-capture">
      <div class="capture-btn" onclick="handleCapture()">
        <div class="capture-inner"></div>
      </div>
    </div>
    <div class="row-controls">
      <div class="led-group">
        <div class="led-card" id="ledPutih" onclick="toggleLED('putih')">
          <div class="led-indicator"></div>
          <div class="toggle"></div>
        </div>
        <div class="led-card" id="ledBiru" onclick="toggleLED('biru')">
          <div class="led-indicator"></div>
          <div class="toggle"></div>
        </div>
      </div>
      <div class="ble-btn" id="bleBtn" onclick="toggleBLE()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
        </svg>
        <span id="bleTxt">BLE</span>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// KONFIGURASI — JANGAN UBAH
// ══════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5KuXspaAEF9LDY9QEU5gcMRH_73H4px6pfkruq3zNdT7Tqy_I5orMzYRwv4ljszAg/exec';

const BLE_SVC  = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const BLE_CHAR = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let bleDevice = null, bleChar = null, bleOn = false;
let camStream = null, camOn = false;
let ledState  = { putih: false, biru: false };
let fotoBlob  = null, fotoObjURL = null;
let scale = 1, p0dist = 0, p0scale = 1;
const SMIN = 1, SMAX = 6;
let badgeTmr, toastTmr;

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function toast(msg, t = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + t;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.className = '', 3500);
}

// ══════════════════════════════════════════════
// BLE
// ══════════════════════════════════════════════
async function toggleBLE() {
  bleOn ? bleDevice?.gatt?.disconnect() : await connectBLE();
}

async function connectBLE() {
  if (!navigator.bluetooth) {
    toast('Gunakan Chrome/Edge di Android', 'err'); return;
  }
  try {
    toast('🔍 Mencari perangkat...');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [BLE_SVC] }]
    });
    bleDevice.addEventListener('gattserverdisconnected', () => {
      setBLE(false); toast('Perangkat terputus', 'err');
    });
    const srv = await bleDevice.gatt.connect();
    bleChar   = await (await srv.getPrimaryService(BLE_SVC)).getCharacteristic(BLE_CHAR);
    setBLE(true);
    toast('✓ Terhubung: ' + bleDevice.name, 'ok');
  } catch(e) {
    if (e.name !== 'NotFoundError') toast('Gagal: ' + (e.message || e), 'err');
  }
}

function setBLE(on) {
  bleOn = on;
  document.getElementById('bleBtn').className = 'ble-btn' + (on ? ' on' : '');
  document.getElementById('bleTxt').textContent = on ? '✓' : 'BLE';
  if (!on) { bleDevice = null; bleChar = null; }
}

async function kirim(cmd) {
  if (!bleChar) { toast('Hubungkan BLE dulu', 'err'); return; }
  try { await bleChar.writeValue(new TextEncoder().encode(cmd)); }
  catch(e) { toast('Gagal kirim perintah', 'err'); }
}

// ══════════════════════════════════════════════
// LED
// ══════════════════════════════════════════════
function toggleLED(id) {
  ledState[id] = !ledState[id];
  document.getElementById('led' + id[0].toUpperCase() + id.slice(1))
    .classList.toggle('on', ledState[id]);
  kirim(id === 'putih'
    ? (ledState.putih ? 'W:1023' : 'W:0')
    : (ledState.biru  ? 'B:1023' : 'B:0'));
}

// ══════════════════════════════════════════════
// KAMERA
// ══════════════════════════════════════════════
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const v = document.getElementById('vid');
    v.srcObject = camStream;
    v.style.display = 'block';
    document.getElementById('camIdle').style.display = 'none';
    document.getElementById('camWrap').classList.add('cam-on');
    camOn = true; scale = 1;
    applyZoom(false);
  } catch(e) {
    toast('Izin kamera ditolak', 'err');
  }
}

function handleCapture() {
  if (!camOn) { startCam(); return; }
  jepret();
}

// ══════════════════════════════════════════════
// PINCH-TO-ZOOM
// ══════════════════════════════════════════════
const wrap = document.getElementById('camWrap');

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    p0dist = dist2(e.touches); p0scale = scale;
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const ns = Math.min(SMAX, Math.max(SMIN, p0scale * dist2(e.touches) / p0dist));
    if (Math.abs(ns - scale) > 0.02) { scale = ns; applyZoom(true); }
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (e.touches.length < 2) {
    clearTimeout(badgeTmr);
    badgeTmr = setTimeout(() => document.getElementById('zoomBadge').classList.remove('show'), 1800);
  }
});

let lastTap = 0;
wrap.addEventListener('touchend', e => {
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 280) { scale = 1; applyZoom(true); }
  lastTap = now;
});

function dist2(t) {
  return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
}
function applyZoom(showBadge) {
  if (!camOn) return;
  document.getElementById('vid').style.transform = `scale(${scale})`;
  const b = document.getElementById('zoomBadge');
  b.textContent = scale.toFixed(1) + '×';
  if (showBadge) b.classList.add('show');
}

// ══════════════════════════════════════════════
// JEPRET
// ══════════════════════════════════════════════
function jepret() {
  const v = document.getElementById('vid');
  if (!v.srcObject) return;

  const vw = v.videoWidth || 1280, vh = v.videoHeight || 720;
  const cw = vw / scale, ch = vh / scale;
  const cvs = document.getElementById('cvs');
  cvs.width = vw; cvs.height = vh;
  cvs.getContext('2d').drawImage(v, (vw-cw)/2, (vh-ch)/2, cw, ch, 0, 0, vw, vh);

  cvs.toBlob(blob => {
    if (fotoObjURL) URL.revokeObjectURL(fotoObjURL);
    fotoBlob   = blob;
    fotoObjURL = URL.createObjectURL(blob);
    document.getElementById('prevImg').src = fotoObjURL;
    document.getElementById('driveLink').style.display = 'none';
    document.getElementById('prevOverlay').classList.add('show');
  }, 'image/jpeg', 0.93);
}

// ══════════════════════════════════════════════
// BUANG FOTO
// ══════════════════════════════════════════════
function buangFoto() {
  document.getElementById('prevOverlay').classList.remove('show');
  document.getElementById('progWrap').style.display = 'none';
  document.getElementById('prevActions').style.display = 'flex';
  document.getElementById('driveLink').style.display = 'none';
  setProgress(0, '');
  if (fotoObjURL) { URL.revokeObjectURL(fotoObjURL); fotoObjURL = null; }
  fotoBlob = null;
}

// ══════════════════════════════════════════════
// SIMPAN KE GALERI HP
// ══════════════════════════════════════════════
async function simpanGaleri() {
  if (!fotoBlob) { toast('Belum ada foto', 'err'); return; }

  const name = `medscan_${ts()}.jpg`;
  const file = new File([fotoBlob], name, { type: 'image/jpeg' });

  // Web Share API → langsung ke galeri (Android/iOS)
  if (typeof navigator.share === 'function') {
    try {
      const ok = !navigator.canShare || navigator.canShare({ files: [file] });
      if (ok) {
        await navigator.share({ files: [file], title: 'MedScan' });
        toast('✓ Tersimpan ke Galeri!', 'ok');
        buangFoto();
        return;
      }
    } catch(e) {
      if (e.name === 'AbortError') return;
      // fallthrough
    }
  }

  // Fallback: auto download
  dlBlob(fotoBlob, name);
  toast('✓ Foto diunduh ke penyimpanan!', 'ok');
  buangFoto();
}

function dlBlob(blob, name) {
  const u = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: u, download: name });
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(u); }, 500);
}

// ══════════════════════════════════════════════
// UPLOAD KE GOOGLE DRIVE via Apps Script
// Permanen — tidak butuh token!
// ══════════════════════════════════════════════
async function uploadDrive() {
  if (!fotoBlob) { toast('Belum ada foto', 'err'); return; }

  // Tampilkan progress, sembunyikan tombol
  document.getElementById('prevActions').style.display = 'none';
  document.getElementById('driveLink').style.display   = 'none';
  const pw = document.getElementById('progWrap');
  pw.style.display = 'flex';
  setProgress(10, 'Mempersiapkan...');

  try {
    // Konversi Blob → Base64 (Apps Script butuh base64)
    const b64 = await blobToBase64(fotoBlob);
    setProgress(30, 'Mengirim ke Drive...');

    const nama = `medscan_${ts()}.jpg`;

    // Kirim ke Google Apps Script via fetch POST
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        filename:  nama,
        mimeType:  'image/jpeg',
        data:      b64          // base64 string tanpa prefix
      })
    });

    setProgress(85, 'Menyimpan...');

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const json = await res.json();
    setProgress(100, 'Selesai! ✓');

    // Tampilkan link ke file di Drive
    if (json.url || json.fileUrl || json.link) {
      const link = document.getElementById('driveLink');
      link.href  = json.url || json.fileUrl || json.link;
      link.style.display = 'block';
    }

    toast('✓ Berhasil upload ke Google Drive!', 'ok');

    // Reset setelah 2.5 detik
    setTimeout(() => {
      pw.style.display = 'none';
      document.getElementById('prevActions').style.display = 'flex';
      setProgress(0, '');
    }, 2500);

  } catch(e) {
    pw.style.display = 'none';
    document.getElementById('prevActions').style.display = 'flex';
    setProgress(0, '');
    toast('Gagal upload: ' + (e.message || e), 'err');
    console.error('Drive upload error:', e);
  }
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function setProgress(pct, label) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent  = pct + '%';
  if (label) document.getElementById('progLabel').textContent = label;
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result.split(',')[1]); // ambil bagian setelah "data:...;base64,"
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

function ts() {
  return new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-');
}
