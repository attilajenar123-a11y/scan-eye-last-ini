<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MedScan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --black: #111111;
    --gray1: #d8dce2;
    --gray2: #b0b6bf;
    --blue: #5bb8f5;
    --blue-ring: #a8d8f8;
    --bottom-h: 110px;
    --radius: 14px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100dvh;
  }

  /* ══ CAMERA AREA ══ */
  .cam-area {
    flex: 1;
    position: relative;
    background: #111;
    overflow: hidden;
    touch-action: none;
  }

  .cam-area video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform-origin: center center;
    will-change: transform;
    pointer-events: none;
    display: none;
  }

  .cam-idle {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #d5d8dd;
  }
  .cam-idle .idle-icon {
    width: 64px; height: 64px;
    opacity: 0.3;
  }
  .cam-idle span {
    font-size: 13px;
    color: #555;
    font-weight: 500;
  }

  /* Zoom badge */
  .zoom-badge {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    letter-spacing: 0.3px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  .zoom-badge.show { opacity: 1; }

  /* Pinch hint (fades out after 3s) */
  .pinch-hint {
    position: absolute;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 100px;
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
    display: none;
    backdrop-filter: blur(4px);
  }
  .cam-active .pinch-hint {
    display: block;
    animation: fadeAway 3s forwards 2s;
  }
  @keyframes fadeAway { to { opacity: 0; } }

  canvas { display: none; }

  /* ══ BOTTOM BAR ══ */
  .bottom-bar {
    height: var(--bottom-h);
    background: var(--white);
    border-top: 1.5px solid var(--gray1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    gap: 12px;
    flex-shrink: 0;
  }

  /* LED cards */
  .led-group { display: flex; gap: 10px; }

  .led-card {
    width: 86px;
    background: var(--white);
    border: 1.5px solid var(--gray1);
    border-radius: var(--radius);
    padding: 10px 11px 11px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .led-card:active { opacity: 0.8; }
  .led-card.on {
    border-color: var(--blue);
    background: rgba(91,184,245,0.06);
  }
  .led-label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }
  .led-card.on .led-label { color: #1a7abf; }

  /* Toggle switch */
  .toggle {
    width: 48px; height: 27px;
    background: var(--gray1);
    border-radius: 14px;
    position: relative;
    transition: background 0.22s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 21px; height: 21px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 5px rgba(0,0,0,0.22);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .led-card.on .toggle { background: var(--blue); }
  .led-card.on .toggle::after { transform: translateX(21px); }

  /* Capture button */
  .capture-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .capture-btn {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 3px solid var(--blue-ring);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .capture-btn:active { transform: scale(0.9); }
  .capture-inner {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 4px 16px rgba(91,184,245,0.5);
    transition: background 0.15s;
  }
  .capture-btn:active .capture-inner { background: #3a9fe0; }

  /* BLE button */
  .ble-btn {
    min-width: 88px;
    height: 44px;
    background: var(--gray1);
    border: 1.5px solid transparent;
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 12px;
    white-space: nowrap;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .ble-btn:active { opacity: 0.75; }
  .ble-btn.on {
    background: rgba(91,184,245,0.15);
    border-color: var(--blue);
    color: #1278b8;
  }

  /* ══ PREVIEW OVERLAY ══ */
  .preview-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .preview-overlay.show { opacity: 1; pointer-events: all; }
  .preview-overlay img {
    max-width: 100%;
    max-height: 56vh;
    border-radius: 12px;
    object-fit: contain;
    box-shadow: 0 12px 48px rgba(0,0,0,0.7);
  }
  .preview-label {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }
  .preview-actions {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  .pv-btn {
    flex: 1; height: 50px;
    border: none; border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pv-btn:active { opacity: 0.7; }
  .pv-discard { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
  .pv-save    { background: var(--blue); color: #fff; box-shadow: 0 4px 16px rgba(91,184,245,0.4); }

  /* ══ TOAST ══ */
  #toast {
    position: fixed;
    bottom: calc(var(--bottom-h) + 14px);
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: rgba(15,15,15,0.88);
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 10px 22px;
    border-radius: 100px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #toast.ok  { background: rgba(0,155,75,0.9); }
  #toast.err { background: rgba(200,30,30,0.9); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- Preview Overlay -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-label">Foto berhasil diambil</div>
  <img id="previewImg" alt="">
  <div class="preview-actions">
    <button class="pv-btn pv-discard" onclick="tutupPreview()">✕ Buang</button>
    <button class="pv-btn pv-save" onclick="simpanFoto()">📱 Simpan ke Galeri</button>
  </div>
</div>

<div class="app">

  <!-- Camera -->
  <div class="cam-area" id="camArea">
    <div class="cam-idle" id="camIdle">
      <svg class="idle-icon" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.3">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Tap tombol biru untuk mulai kamera</span>
    </div>

    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasFoto"></canvas>

    <div class="zoom-badge" id="zoomBadge">1.0×</div>
    <div class="pinch-hint">Cubit 2 jari untuk zoom · Tap 2× untuk reset</div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">

    <div class="led-group">
      <div class="led-card" id="cardPutih" onclick="toggleLED('putih')">
        <span class="led-label">LED Putih</span>
        <div class="toggle"></div>
      </div>
      <div class="led-card" id="cardBiru" onclick="toggleLED('biru')">
        <span class="led-label">LED Biru</span>
        <div class="toggle"></div>
      </div>
    </div>

    <div class="capture-wrap">
      <div class="capture-btn" onclick="handleCapture()">
        <div class="capture-inner"></div>
      </div>
    </div>

    <button class="ble-btn" id="bleBtn" onclick="toggleBLE()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
      </svg>
      <span id="bleTxt">Bluetooth</span>
    </button>
  </div>
</div>

<script>
// ── CONFIG ──
const BLE_SVC  = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const BLE_CHAR = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
let bleDevice = null, bleChar = null, bleOn = false;

// ── STATE ──
let stream = null, camOn = false;
let ledOn = { putih: false, biru: false };
let foto = null;

// Zoom
let scale = 1.0;
const SCALE_MIN = 1.0, SCALE_MAX = 6.0;

// ── TOAST ──
let toastTmr;
function toast(msg, t = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + t;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.className = '', 3000);
}

// ── BLE ──
async function toggleBLE() {
  bleOn ? disconnectBLE() : await connectBLE();
}
async function connectBLE() {
  if (!navigator.bluetooth) { toast('Browser tidak support BLE', 'err'); return; }
  try {
    toast('Mencari perangkat...');
    bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ services: [BLE_SVC] }] });
    bleDevice.addEventListener('gattserverdisconnected', () => { setBLE(false); toast('Terputus', 'err'); });
    const srv = await bleDevice.gatt.connect();
    const svc = await srv.getPrimaryService(BLE_SVC);
    bleChar   = await svc.getCharacteristic(BLE_CHAR);
    setBLE(true);
    toast('✓ Terhubung ke ' + bleDevice.name, 'ok');
  } catch(e) {
    if (e.name !== 'NotFoundError') toast('Gagal: ' + (e.message||e), 'err');
  }
}
function disconnectBLE() {
  bleDevice?.gatt?.disconnect();
}
function setBLE(on) {
  bleOn = on;
  const btn = document.getElementById('bleBtn');
  btn.className = 'ble-btn' + (on ? ' on' : '');
  document.getElementById('bleTxt').textContent = on ? 'Terhubung' : 'Bluetooth';
  if (!on) { bleDevice = null; bleChar = null; }
}
async function kirim(cmd) {
  if (!bleChar) { toast('Hubungkan Bluetooth dulu', 'err'); return; }
  try { await bleChar.writeValue(new TextEncoder().encode(cmd)); }
  catch(e) { toast('Gagal kirim', 'err'); }
}

// ── LED ──
function toggleLED(id) {
  ledOn[id] = !ledOn[id];
  const card = document.getElementById('card' + id.charAt(0).toUpperCase() + id.slice(1));
  card.classList.toggle('on', ledOn[id]);
  kirim(id === 'putih' ? (ledOn.putih ? 'W:1023' : 'W:0') : (ledOn.biru ? 'B:1023' : 'B:0'));
}

// ── KAMERA ──
async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const v = document.getElementById('videoEl');
    v.srcObject = stream;
    v.style.display = 'block';
    document.getElementById('camIdle').style.display = 'none';
    document.getElementById('camArea').classList.add('cam-active');
    camOn = true;
    scale = 1.0;
    applyScale(false);
  } catch(e) {
    toast('Kamera tidak bisa diakses', 'err');
  }
}

function handleCapture() {
  if (!camOn) { startCam(); return; }
  jepret();
}

// ── PINCH TO ZOOM ──
let p0dist = 0, p0scale = 1;
let badgeTimer;

const area = document.getElementById('camArea');

area.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    p0dist  = dist2(e.touches);
    p0scale = scale;
  }
}, { passive: false });

area.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const d = dist2(e.touches);
    const ns = clamp(p0scale * (d / p0dist), SCALE_MIN, SCALE_MAX);
    if (Math.abs(ns - scale) > 0.02) {
      scale = ns;
      applyScale(true);
    }
  }
}, { passive: false });

area.addEventListener('touchend', e => {
  if (e.touches.length < 2) autoHideBadge();
});

// Double tap = reset zoom
let lastTap = 0;
area.addEventListener('touchend', e => {
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 280) {
    scale = 1.0;
    applyScale(true);
    autoHideBadge();
  }
  lastTap = now;
});

function dist2(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.hypot(dx, dy);
}
function clamp(v, mn, mx) { return Math.min(mx, Math.max(mn, v)); }

function applyScale(showBadge) {
  if (!camOn) return;
  document.getElementById('videoEl').style.transform = `scale(${scale})`;
  const badge = document.getElementById('zoomBadge');
  badge.textContent = scale.toFixed(1) + '×';
  if (showBadge) badge.classList.add('show');
}
function autoHideBadge() {
  clearTimeout(badgeTimer);
  badgeTimer = setTimeout(() => document.getElementById('zoomBadge').classList.remove('show'), 1800);
}

// ── JEPRET ──
function jepret() {
  const v   = document.getElementById('videoEl');
  const cvs = document.getElementById('canvasFoto');
  if (!v.srcObject) return;

  const vw = v.videoWidth  || 1280;
  const vh = v.videoHeight || 720;

  // Crop area sesuai zoom
  const cw = vw / scale, ch = vh / scale;
  const cx = (vw - cw) / 2, cy = (vh - ch) / 2;

  cvs.width = vw; cvs.height = vh;
  const ctx = cvs.getContext('2d');
  ctx.drawImage(v, cx, cy, cw, ch, 0, 0, vw, vh);

  foto = cvs.toDataURL('image/jpeg', 0.93);
  document.getElementById('previewImg').src = foto;
  document.getElementById('previewOverlay').classList.add('show');
}

// ── PREVIEW ──
function tutupPreview() {
  document.getElementById('previewOverlay').classList.remove('show');
  foto = null;
}

async function simpanFoto() {
  if (!foto) return;
  tutupPreview();

  // Web Share API → langsung ke galeri HP
  if (navigator.share && navigator.canShare) {
    try {
      const blob = await (await fetch(foto)).blob();
      const ts   = new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
      const file = new File([blob], `medscan_${ts}.jpg`, { type: 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'MedScan' });
        toast('✓ Foto disimpan ke Galeri!', 'ok');
        return;
      }
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }

  // Fallback: download otomatis
  const ts = new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
  const a  = document.createElement('a');
  a.href = foto; a.download = `medscan_${ts}.jpg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('✓ Foto tersimpan!', 'ok');
}
</script>
</body>
</html>
