<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MedScan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --white: #ffffff;
  --gray: #d8dce2;
  --blue: #5bb8f5;
  --blue-ring: #a8d8f8;
  --blue-dark: #1a7abf;
  --green: #22c55e;
  --bottom-h: 160px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f4f5f7;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100dvh;
}

/* ══ CAMERA ══ */
.cam-wrap {
  flex: 1;
  position: relative;
  background: #c8cdd4;
  overflow: hidden;
  touch-action: none;
}
.cam-wrap video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform-origin: center center;
  will-change: transform;
  pointer-events: none;
  display: none;
}
.cam-idle {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; background: #d0d4da;
}
.cam-idle svg { opacity: 0.28; }
.cam-idle p { font-size: 13px; color: #666; font-weight: 500; }

.zoom-badge {
  position: absolute; top: 14px; right: 14px;
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 12px; font-weight: 700;
  padding: 4px 11px; border-radius: 100px;
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none; z-index: 5;
  backdrop-filter: blur(6px);
}
.zoom-badge.show { opacity: 1; }

.pinch-hint {
  position: absolute; bottom: 12px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.85);
  font-size: 11px; padding: 5px 14px; border-radius: 100px;
  pointer-events: none; white-space: nowrap; display: none;
  backdrop-filter: blur(6px);
}
.cam-on .pinch-hint { display: block; animation: fadeHint 3s forwards 2.5s; }
@keyframes fadeHint { to { opacity: 0; } }

canvas { display: none; }

/* ══ BOTTOM ══ */
.bottom {
  height: var(--bottom-h);
  background: var(--white);
  border-top: 1.5px solid var(--gray);
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-evenly;
  padding: 10px 20px 14px;
  flex-shrink: 0;
}
.row-capture {
  display: flex; align-items: center;
  justify-content: center; width: 100%;
}
.capture-btn {
  width: 66px; height: 66px;
  border-radius: 50%;
  border: 3px solid var(--blue-ring);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s;
  position: relative;
}
.capture-btn:active { transform: scale(0.88); }
.capture-inner {
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 4px 14px rgba(91,184,245,0.55);
  transition: background 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.capture-btn:active .capture-inner { background: #3aa0e0; }

/* Spinner di dalam tombol capture saat processing */
.spinner {
  display: none;
  width: 22px; height: 22px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.capture-btn.loading .capture-inner { background: #3aa0e0; }
.capture-btn.loading .spinner { display: block; }

.row-controls {
  display: flex; align-items: center;
  justify-content: space-between;
  width: 100%; gap: 10px;
}
.led-group { display: flex; gap: 10px; }

.led-card {
  width: 80px;
  background: var(--white);
  border: 1.5px solid var(--gray);
  border-radius: 12px;
  padding: 9px 10px 10px;
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 7px;
  cursor: pointer; user-select: none;
  transition: border-color 0.2s, background 0.2s;
}
.led-card:active { opacity: 0.75; }
.led-card.on { border-color: var(--blue); background: rgba(91,184,245,0.07); }

.led-indicator {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--gray); transition: background 0.2s;
}
.led-card.on .led-indicator {
  background: var(--blue);
  box-shadow: 0 0 8px rgba(91,184,245,0.5);
}
.toggle {
  width: 46px; height: 26px;
  background: var(--gray); border-radius: 13px;
  position: relative; transition: background 0.22s;
}
.toggle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.led-card.on .toggle { background: var(--blue); }
.led-card.on .toggle::after { transform: translateX(20px); }

.ble-btn {
  width: 42px; height: 72px;
  background: var(--gray);
  border: 1.5px solid transparent; border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0;
}
.ble-btn:active { opacity: 0.7; }
.ble-btn.on { background: rgba(91,184,245,0.15); border-color: var(--blue); }
.ble-btn span {
  font-size: 9px; font-weight: 700; color: #555;
  text-align: center; line-height: 1.2;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.ble-btn.on span { color: var(--blue-dark); }

/* ══ STATUS OVERLAY (menggantikan preview — langsung proses) ══ */
.status-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.82);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; padding: 32px 28px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.status-overlay.show { opacity: 1; pointer-events: all; }

.status-img {
  width: 140px; height: 105px;
  border-radius: 10px; object-fit: cover;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.status-title {
  font-size: 16px; font-weight: 700; color: #fff;
  text-align: center;
}
.status-sub {
  font-size: 12px; color: rgba(255,255,255,0.45);
  text-align: center; margin-top: -12px;
}

/* Status rows */
.status-rows { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.status-row {
  display: flex; align-items: center;
  gap: 12px; padding: 12px 14px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
}
.status-row .icon { font-size: 18px; flex-shrink: 0; }
.status-row .info { flex: 1; }
.status-row .info .label {
  font-size: 13px; font-weight: 600; color: #fff;
}
.status-row .info .sub {
  font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px;
}

/* Mini progress bar per row */
.mini-prog {
  height: 3px; width: 100%;
  background: rgba(255,255,255,0.1); border-radius: 2px;
  margin-top: 5px; overflow: hidden;
}
.mini-fill {
  height: 100%; width: 0%;
  border-radius: 2px;
  transition: width 0.3s ease;
}
.mini-fill.blue  { background: var(--blue); }
.mini-fill.green { background: var(--green); }

/* Check / spinner per row */
.row-status { flex-shrink: 0; font-size: 18px; }

/* Dismiss button */
.btn-dismiss {
  width: 100%; height: 48px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: rgba(255,255,255,0.8);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: none;
}
.btn-dismiss.show { display: block; }
.btn-dismiss:active { opacity: 0.7; }

/* ══ TOAST ══ */
#toast {
  position: fixed;
  bottom: calc(var(--bottom-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(10,10,10,0.88); color: #fff;
  font-size: 13px; font-weight: 500;
  padding: 10px 22px; border-radius: 100px;
  z-index: 300; opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter: blur(10px); white-space: nowrap;
  font-family: 'Plus Jakarta Sans', sans-serif;
  max-width: 90vw; text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { background: rgba(0,150,70,0.92); }
#toast.err { background: rgba(200,30,30,0.92); }

/* iframe tersembunyi untuk bypass CORS iOS */
#uploadFrame { display: none; }
</style>
</head>
<body>

<div id="toast"></div>
<iframe id="uploadFrame" name="uploadFrame"></iframe>

<!-- Status Overlay -->
<div class="status-overlay" id="statusOverlay">
  <img class="status-img" id="statusImg" alt="">
  <div class="status-title">Menyimpan foto...</div>
  <div class="status-sub" id="statusSub">Harap tunggu sebentar</div>

  <div class="status-rows">
    <!-- Row Galeri -->
    <div class="status-row" id="rowGaleri">
      <div class="icon">📱</div>
      <div class="info">
        <div class="label">Simpan ke Galeri</div>
        <div class="sub" id="subGaleri">Memproses...</div>
        <div class="mini-prog"><div class="mini-fill blue" id="fillGaleri"></div></div>
      </div>
      <div class="row-status" id="iconGaleri">⏳</div>
    </div>

    <!-- Row Drive -->
    <div class="status-row" id="rowDrive">
      <div class="icon">☁️</div>
      <div class="info">
        <div class="label">Upload ke Google Drive</div>
        <div class="sub" id="subDrive">Menunggu...</div>
        <div class="mini-prog"><div class="mini-fill green" id="fillDrive"></div></div>
      </div>
      <div class="row-status" id="iconDrive">⏳</div>
    </div>
  </div>

  <button class="btn-dismiss" id="btnDismiss" onclick="tutupStatus()">✓ Selesai</button>
</div>

<div class="app">
  <!-- Camera -->
  <div class="cam-wrap" id="camWrap">
    <div class="cam-idle" id="camIdle">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.3">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>Tap tombol biru untuk mulai kamera</p>
    </div>
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="cvs"></canvas>
    <div class="zoom-badge" id="zoomBadge">1.0×</div>
    <div class="pinch-hint">Cubit 2 jari untuk zoom · Tap 2× reset</div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="row-capture">
      <div class="capture-btn" id="captureBtn" onclick="handleCapture()">
        <div class="capture-inner">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
    <div class="row-controls">
      <div class="led-group">
        <div class="led-card" id="ledPutih" onclick="toggleLED('putih')">
          <div class="led-indicator"></div>
          <div class="toggle"></div>
        </div>
        <div class="led-card" id="ledBiru" onclick="toggleLED('biru')">
          <div class="led-indicator"></div>
          <div class="toggle"></div>
        </div>
      </div>
      <div class="ble-btn" id="bleBtn" onclick="toggleBLE()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
        </svg>
        <span id="bleTxt">BLE</span>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// KONFIGURASI
// ════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5KuXspaAEF9LDY9QEU5gcMRH_73H4px6pfkruq3zNdT7Tqy_I5orMzYRwv4ljszAg/exec';

const BLE_SVC  = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const BLE_CHAR = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let bleDevice = null, bleChar = null, bleOn = false;
let camStream = null, camOn = false;
let ledState  = { putih: false, biru: false };
let fotoBlob  = null, fotoObjURL = null;
let scale = 1, p0dist = 0, p0scale = 1;
const SMIN = 1, SMAX = 6;
let badgeTmr, toastTmr, processing = false;

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
function toast(msg, t = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + t;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.className = '', 3500);
}

// ════════════════════════════════════════
// BLE
// ════════════════════════════════════════
async function toggleBLE() {
  bleOn ? bleDevice?.gatt?.disconnect() : await connectBLE();
}
async function connectBLE() {
  if (!navigator.bluetooth) { toast('Gunakan Chrome di Android', 'err'); return; }
  try {
    toast('🔍 Mencari perangkat...');
    bleDevice = await navigator.bluetooth.requestDevice({ filters:[{ services:[BLE_SVC] }] });
    bleDevice.addEventListener('gattserverdisconnected', () => { setBLE(false); toast('Terputus','err'); });
    const srv = await bleDevice.gatt.connect();
    bleChar   = await (await srv.getPrimaryService(BLE_SVC)).getCharacteristic(BLE_CHAR);
    setBLE(true); toast('✓ ' + bleDevice.name, 'ok');
  } catch(e) { if (e.name !== 'NotFoundError') toast('Gagal: '+(e.message||e),'err'); }
}
function setBLE(on) {
  bleOn = on;
  document.getElementById('bleBtn').className = 'ble-btn'+(on?' on':'');
  document.getElementById('bleTxt').textContent = on ? '✓' : 'BLE';
  if (!on) { bleDevice=null; bleChar=null; }
}
async function kirim(cmd) {
  if (!bleChar) { toast('Hubungkan BLE dulu','err'); return; }
  try { await bleChar.writeValue(new TextEncoder().encode(cmd)); }
  catch(e) { toast('Gagal kirim','err'); }
}

// ════════════════════════════════════════
// LED
// ════════════════════════════════════════
function toggleLED(id) {
  ledState[id] = !ledState[id];
  document.getElementById('led'+id[0].toUpperCase()+id.slice(1)).classList.toggle('on', ledState[id]);
  kirim(id==='putih' ? (ledState.putih?'W:1023':'W:0') : (ledState.biru?'B:1023':'B:0'));
}

// ════════════════════════════════════════
// KAMERA
// ════════════════════════════════════════
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }
    });
    const v = document.getElementById('vid');
    v.srcObject = camStream; v.style.display = 'block';
    document.getElementById('camIdle').style.display = 'none';
    document.getElementById('camWrap').classList.add('cam-on');
    camOn = true; scale = 1; applyZoom(false);
  } catch(e) { toast('Izin kamera ditolak','err'); }
}

function handleCapture() {
  if (processing) return;
  if (!camOn) { startCam(); return; }
  jepretDanSimpan();
}

// ════════════════════════════════════════
// PINCH-TO-ZOOM
// ════════════════════════════════════════
const wrap = document.getElementById('camWrap');
wrap.addEventListener('touchstart', e => {
  if (e.touches.length===2) { e.preventDefault(); p0dist=dist2(e.touches); p0scale=scale; }
}, { passive:false });
wrap.addEventListener('touchmove', e => {
  if (e.touches.length===2) {
    e.preventDefault();
    const ns = Math.min(SMAX, Math.max(SMIN, p0scale*dist2(e.touches)/p0dist));
    if (Math.abs(ns-scale)>0.02) { scale=ns; applyZoom(true); }
  }
}, { passive:false });
wrap.addEventListener('touchend', e => {
  if (e.touches.length<2) { clearTimeout(badgeTmr); badgeTmr=setTimeout(()=>document.getElementById('zoomBadge').classList.remove('show'),1800); }
});
let lastTap=0;
wrap.addEventListener('touchend', e => {
  if (e.touches.length>0) return;
  const now=Date.now();
  if (now-lastTap<280) { scale=1; applyZoom(true); }
  lastTap=now;
});
function dist2(t) { return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
function applyZoom(show) {
  if (!camOn) return;
  document.getElementById('vid').style.transform=`scale(${scale})`;
  const b=document.getElementById('zoomBadge');
  b.textContent=scale.toFixed(1)+'×';
  if (show) b.classList.add('show');
}

// ════════════════════════════════════════
// JEPRET → LANGSUNG SIMPAN GALERI + DRIVE
// ════════════════════════════════════════
function jepretDanSimpan() {
  const v = document.getElementById('vid');
  if (!v.srcObject) return;

  // Loading state pada tombol capture
  processing = true;
  document.getElementById('captureBtn').classList.add('loading');

  const vw = v.videoWidth||1280, vh = v.videoHeight||720;
  const cw = vw/scale, ch = vh/scale;
  const cvs = document.getElementById('cvs');
  cvs.width=vw; cvs.height=vh;
  cvs.getContext('2d').drawImage(v, (vw-cw)/2, (vh-ch)/2, cw, ch, 0, 0, vw, vh);

  cvs.toBlob(blob => {
    fotoBlob = blob;
    if (fotoObjURL) URL.revokeObjectURL(fotoObjURL);
    fotoObjURL = URL.createObjectURL(blob);

    // Tampilkan status overlay dengan thumbnail
    document.getElementById('statusImg').src = fotoObjURL;
    document.getElementById('statusOverlay').classList.add('show');
    document.getElementById('captureBtn').classList.remove('loading');
    processing = false;

    // Reset status rows
    setRowState('Galeri', 'pending', 'Menyimpan...', 0);
    setRowState('Drive', 'pending', 'Menunggu...', 0);
    document.getElementById('btnDismiss').classList.remove('show');

    // Jalankan keduanya paralel
    simpanGaleri(blob);
    uploadDrive(blob);
  }, 'image/jpeg', 0.93);
}

// ════════════════════════════════════════
// STATUS ROW HELPER
// ════════════════════════════════════════
function setRowState(id, state, sub, pct) {
  // state: 'pending' | 'loading' | 'ok' | 'err'
  const icons = { pending:'⏳', loading:'🔄', ok:'✅', err:'❌' };
  const fills = { Galeri:'fillGaleri', Drive:'fillDrive' };
  document.getElementById('sub'+id).textContent = sub;
  document.getElementById('icon'+id).textContent = icons[state] || '⏳';
  document.getElementById(fills[id]).style.width = pct + '%';
}

function cekSelesai() {
  // Tampilkan tombol dismiss jika kedua proses sudah ok/err
  const g = document.getElementById('iconGaleri').textContent;
  const d = document.getElementById('iconDrive').textContent;
  if ((g==='✅'||g==='❌') && (d==='✅'||d==='❌')) {
    document.getElementById('btnDismiss').classList.add('show');
  }
}

function tutupStatus() {
  document.getElementById('statusOverlay').classList.remove('show');
  if (fotoObjURL) { URL.revokeObjectURL(fotoObjURL); fotoObjURL=null; }
  fotoBlob=null;
}

// ════════════════════════════════════════
// SIMPAN KE GALERI
// iOS Safari: pakai <a download> — paling reliable
// Android Chrome: Web Share API → galeri langsung
// ════════════════════════════════════════
async function simpanGaleri(blob) {
  setRowState('Galeri', 'loading', 'Menyimpan ke galeri...', 40);
  const name = 'medscan_'+ts()+'.jpg';

  // Coba Web Share API dulu (Android Chrome → langsung ke galeri)
  if (typeof navigator.share === 'function') {
    try {
      const file = new File([blob], name, { type:'image/jpeg' });
      const ok = !navigator.canShare || navigator.canShare({ files:[file] });
      if (ok) {
        setRowState('Galeri', 'loading', 'Buka panel berbagi...', 70);
        await navigator.share({ files:[file], title:'MedScan' });
        setRowState('Galeri', 'ok', 'Tersimpan ke Galeri ✓', 100);
        cekSelesai(); return;
      }
    } catch(e) {
      if (e.name==='AbortError') {
        // User cancel share — fallback ke download
      }
    }
  }

  // Fallback: <a download> auto-click
  // iOS Safari: file langsung masuk ke Files/Download, bisa disimpan ke Foto manual
  try {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
    setRowState('Galeri', 'ok', 'Tersimpan ke Unduhan ✓', 100);
  } catch(e) {
    setRowState('Galeri', 'err', 'Gagal: '+e.message, 0);
  }
  cekSelesai();
}

// ════════════════════════════════════════
// UPLOAD KE GOOGLE DRIVE
// Fix iOS CORS: pakai XMLHttpRequest dengan mode no-cors tidak bisa dapat response,
// jadi kita pakai fetch dengan try/catch + fallback form POST
// ════════════════════════════════════════
async function uploadDrive(blob) {
  setRowState('Drive', 'loading', 'Mengkonversi gambar...', 15);

  const name = 'medscan_'+ts()+'.jpg';
  let b64;
  try {
    b64 = await blobToBase64(blob);
  } catch(e) {
    setRowState('Drive', 'err', 'Gagal baca gambar', 0);
    cekSelesai(); return;
  }

  setRowState('Drive', 'loading', 'Mengirim ke Drive...', 35);

  const payload = JSON.stringify({ filename:name, mimeType:'image/jpeg', data:b64 });

  // ── Metode 1: fetch POST (Android Chrome, desktop) ──
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), 30000); // timeout 30 detik

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      signal: ctrl.signal,
      headers: { 'Content-Type':'application/json' },
      body: payload
    });
    clearTimeout(tid);
    setRowState('Drive', 'loading', 'Memproses...', 80);

    // Apps Script selalu redirect — response bisa ok atau opaque
    // Anggap sukses jika tidak throw
    let json = {};
    try { json = await res.json(); } catch(_) {}

    setRowState('Drive', 'ok', 'Berhasil di Google Drive ✓', 100);
    cekSelesai(); return;

  } catch(e) {
    // fetch gagal (CORS iOS) → coba XMLHttpRequest no-cors
    console.warn('fetch gagal, coba XHR:', e.message);
  }

  // ── Metode 2: XMLHttpRequest (lebih toleran di iOS) ──
  try {
    await xhrPost(APPS_SCRIPT_URL, payload, pct => {
      setRowState('Drive', 'loading', 'Mengirim... '+pct+'%', 35+pct*0.45);
    });
    setRowState('Drive', 'ok', 'Berhasil di Google Drive ✓', 100);
    cekSelesai(); return;
  } catch(e) {
    console.warn('XHR juga gagal:', e.message);
  }

  // ── Metode 3: Form POST ke iframe (bypass CORS total di iOS Safari) ──
  try {
    setRowState('Drive', 'loading', 'Mengirim via form...', 50);
    await formPost(APPS_SCRIPT_URL, { payload: payload });
    // Tidak dapat response karena iframe cross-origin, tapi request terkirim
    setRowState('Drive', 'ok', 'Terkirim ke Drive ✓', 100);
  } catch(e) {
    setRowState('Drive', 'err', 'Gagal: '+e.message, 0);
  }
  cekSelesai();
}

// ── XHR dengan progress ──
function xhrPost(url, body, onProg) {
  return new Promise((resolve, reject) => {
    const x = new XMLHttpRequest();
    x.open('POST', url, true);
    x.setRequestHeader('Content-Type','application/json');
    x.timeout = 30000;
    x.upload.onprogress = e => {
      if (e.lengthComputable) onProg(Math.round(e.loaded/e.total*100));
    };
    x.onload  = () => resolve(x.responseText);
    x.onerror = () => reject(new Error('XHR network error'));
    x.ontimeout = () => reject(new Error('XHR timeout'));
    x.send(body);
  });
}

// ── Form POST ke iframe (bypass CORS iOS) ──
function formPost(url, fields) {
  return new Promise((resolve) => {
    const form  = document.createElement('form');
    form.method = 'POST';
    form.action = url;
    form.target = 'uploadFrame'; // ke iframe tersembunyi
    form.style.display = 'none';
    Object.entries(fields).forEach(([k,v]) => {
      const inp = document.createElement('input');
      inp.type='hidden'; inp.name=k; inp.value=v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    setTimeout(() => { document.body.removeChild(form); resolve(); }, 3000);
  });
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}
function ts() {
  return new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
}
